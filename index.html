<html>
  <head>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- site header hero -->
    <div class="hero">
      <div class="container hero-content">
        <form class="find-location">
          <input type="text" placeholder="Find your location..." id="search" />
          <input type="button" value="Find" id="submit" />
        </form>
        <div class="forecast-table">
          <div class="container">
            <div class="forecast-container d-flex">
              <div class="row w-100 p-0 ms-0" id="forecast">
                <div class="today forecast p-0 col-lg-4">
                  <div
                    class="forecast-header d-flex justify-content-between align-items-center"
                    id="today"
                  >
                    <p id="today-date-day-name" class="day m-0 fs-4"></p>

                    <span>
                      <span id="today-date-day-num" class="date fs-4"></span>
                      <span id="today-date-month" class="date fs-4"></span>
                    </span>
                  </div>
                  <div class="forecast-content" id="current">
                    <div id="today-location" class="location"></div>
                    <div class="degree d-flex">
                      <span>
                        <span id="today-temp"></span>
                        <span class="fs-1 fw-bolder"><sup>o</sup>C</span>
                      </span>

                      <div class="forecast-icon">
                        <img id="today-condition-img" src="" alt="" class="w-100" />
                      </div>
                    </div>
                    <p id="today-condition-text" class="custom"></p>
                    
                    <div class="item-footer d-flex text-light">
                      <div class="d-flex align-items-center me-2 py-2">
                        <img class="px-1" src="image/icon-umberella.png" alt="" />
                        <p id="humidity" class="m-0"></p>
                      </div>
                      <div class="d-flex align-items-center me-2 py-2">
                        <img class="px-1" src="image/icon-wind.png" alt="" />
                        <p id="wind" class="m-0"></p>
                      </div>
                      <div class="d-flex align-items-center me-2 py-2">
                        <img class="px-1" src="image/icon-compass.png" alt="" />
                        <p id="wind-direction" class="m-0"></p>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="forecast text-center p-0 col-lg-4">
                  <div class="forecast-header">
                    <div class="day next-day-name fs-4"></div>
                  </div>

                  <div class="forecast-content">
                    <div class="forecast-icon py-1">
                      <img src="" class="next-condition-img" alt="" width="48" />
                    </div>
                    <h3>
                      <span class="next-max-temp degree"></span>
                      <span class="degree py-1"><sup>o</sup>C</span>
                    </h3>

                    <h3>
                      <span class="next-min-temp degree"></span>
                      <span class="degree py-1"><sup>o</sup>C</span>
                    </h3>
                    <p class="next-condition-text custom py-1"></p>
                  </div>
                </div>

                <div class="forecast text-center p-0 col-lg-4">
                  <div class="forecast-header">
                    <div class="day next-day-name fs-4"></div>
                  </div>

                  <div class="forecast-content">
                    <div class="forecast-icon py-1">
                      <img src="" class="next-condition-img" alt="" width="48" />
                    </div>
                    <h3>
                      <span class="next-max-temp degree"></span>
                      <span class="degree py-1"><sup>o</sup>C</span>
                    </h3>

                    <h3>
                      <span class="next-min-temp degree"></span>
                      <span class="degree py-1"><sup>o</sup>C</span>
                    </h3>
                    <p class="next-condition-text custom py-1"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- end site header -->
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
